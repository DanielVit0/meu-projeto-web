<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulários</title>
</head>
<body>
    <h1>Formulários</h1>
    <form action="processa.html" method="get">
    <fieldset>
        <legend>Dados pessoais</legend>
                <label for="nome">Nome:</label><br>
                <input type="text" name="nome" id="nome" placeholder="Digite seu nome"><br>

                <label for="email">Digite seu Email:</label><br>
                <input type="text" name="email" id="email" placeholder="Digite seu email"><br>
                
                <input type="checkbox" name="receberemail">
                <label>Quero receber esse email.</label><br><br>
                
                <label for="password">Senha:</label>
                <input type="password" name="password" id="password" placeholder="Digite sua senha"><br>
    </fieldset>
    <fieldset>
        <legend>Dados adicionais</legend>

            <input type="radio" name="tipo" id="pf" value="pf"> 
            <label for="pf">Pessoa Física</label>
            <input type="radio" name="tipo" id="pj" value="pj">
            <label for="pj">Pessoa Jurídica</label>
    </fieldset>
    <input type="submit" value="entrar">
    </form>
</body>
</html>
