<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interface de login do Trello</title>
    <script src="https://unpkg.com/@codans/trello"></script>
    <!--
      <script src="https://unpkg.com/@codans/trello"></script>
    -->

</head>
<body>
<img src="img/trello.svg" width="200px">
<h1>Fazer login no Trello</h1>
<form action="" method="get">
  <label for="email">E-mail: </label>
  <input type="text" name="email" id="email" placeholder="Insira seu E-mail">
  <label for="password">Senha: </label>
  <input type="password" name="password" id="password" placeholder="Insira sua senha">
  <input type="submit" value="Fazer Login">

  <span>ou</span>

  <button> <img src="img/google.svg" alt="google" width="20"> Continuar com Google</button>
  <button> <img src="img/microsoft.svg" alt="microsoft" width="20"> Continuar com a Microsoft</button>
  <button> <img src="img/apple.svg" alt="apple" width="20"> Continuar com a Apple</button>
  <button> <img src="img/slack.svg" alt="slack" width="20"> Continuar com Slack</button>
</form>

<img src="img/interactive.svg" width="200">
<img src="img/analytics.svg" width="200">
<img src="img/atlassian.svg" width="200">
</body>
</html>
